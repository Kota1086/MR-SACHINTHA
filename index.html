<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puke QR Generator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
background:linear-gradient(270deg,#000000,#0f2027,#203a43,#2c5364);
background-size:800% 800%;
animation:bgMove 12s ease infinite;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* loading screen */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.loaderCircle{
width:80px;
height:80px;
border:8px solid #333;
border-top:8px solid #00ff9d;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* form */

.container{
width:420px;
background:rgba(0,0,0,0.65);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,255,150,0.5);
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

h1{
color:#00ff88;
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
margin-bottom:30px;
color:#ccc;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
outline:none;
font-size:16px;
}

.downloadBtn{
margin-top:30px;
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
background:linear-gradient(90deg,#ff0000,#ff9900,#00ffcc);
color:white;
cursor:pointer;
transition:0.3s;
}

.downloadBtn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ffcc;
}

.footer{
margin-top:20px;
text-align:center;
font-size:14px;
color:#aaa;
}

</style>
</head>

<body>

<!-- loading screen -->

<div id="loader">
<div class="loaderCircle"></div>
</div>

<div class="container">

<h1>Puke ඇරගන්න</h1>
<p class="subtitle">QR generator</p>

<label>සම්පූර්ණ නම</label>
<input type="text">

<label>ගම</label>
<input type="text">

<label>වයස</label>
<input type="number">

<label>Puke ඇරගත යුතු වාර ගණන</label>
<input type="number">

<button class="downloadBtn" onclick="downloadQR()">Download QR</button>

<div class="footer">
URUBOKKA VTA (A/C)<br>
Develop by
</div>

</div>

<script>

window.onload=function(){
setTimeout(function(){
document.getElementById("loader").style.display="none";
},2000);
}

function downloadQR(){

let link=document.createElement("a");
link.href="https://i.ibb.co/pvPZqY3J/qr.png";
link.download="puke_qr.png";
document.body.appendChild(link);
link.click();
document.body.removeChild(link);

}

</script>

</body>
</html>
